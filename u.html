<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUNNER INFINITY FINAL</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:#fff; }
#menu, #gameOver {
  position:absolute; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  flex-direction:column; background:#000; color:#fff;
}
button { padding:12px 20px; font-size:18px; margin:5px; }
</style>
</head>
<body><div id="menu">
  <h1>NEON INFINITY FINAL</h1>
  <button onclick="startGame()">START</button>
</div><div id="gameOver" style="display:none;">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="restart()">RESTART</button>
</div><canvas id="game"></canvas>

<div id="ui">Score: 0 | High: 0 | Level: 1</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let player, obstacles, stars;
let score, highScore, speed, level;
let running = false;

highScore = localStorage.getItem("highScore") || 0;

function reset(){
  player = { x:100, y:canvas.height/2, vy:0, size:20 };
  obstacles = [];
  stars = [];
  score = 0;
  speed = 5;
  level = 1;

  for(let i=0;i<100;i++){
    stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*3+1});
  }
}

function startGame(){
  document.getElementById("menu").style.display = "none";
  reset();
  running = true;
  loop();
}

function restart(){
  document.getElementById("gameOver").style.display = "none";
  startGame();
}

function spawnObstacle(){
  obstacles.push({
    x:canvas.width,
    y:Math.random()*canvas.height,
    size:20 + Math.random()*50,
    vy:(Math.random()-0.5)*2
  });
}

setInterval(()=>{ if(running) spawnObstacle(); }, 600);

function drawStars(){
  stars.forEach(s=>{
    s.x -= speed * s.z;
    if(s.x < 0){ s.x = canvas.width; s.y = Math.random()*canvas.height; }

    ctx.fillStyle = "white";
    ctx.fillRect(s.x, s.y, s.z, s.z);
  });
}

function loop(){
  if(!running) return;

  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawStars();

  // Player
  player.vy += 0.5;
  player.y += player.vy;

  if(player.y > canvas.height){ player.y = canvas.height; player.vy = 0; }
  if(player.y < 0) player.y = 0;

  ctx.shadowBlur = 25;
  ctx.shadowColor = "cyan";
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Obstacles
  obstacles.forEach((o,i)=>{
    o.x -= speed;
    o.y += o.vy;

    ctx.fillStyle = "red";
    ctx.fillRect(o.x, o.y, o.size, o.size);

    if(Math.abs(player.x-o.x) < o.size && Math.abs(player.y-o.y) < o.size){
      gameOver();
    }
  });

  obstacles = obstacles.filter(o => o.x > -100);

  // INFINITE SCALING
  speed += 0.002;
  score++;
  level = Math.floor(score / 1000) + 1;

  document.getElementById("ui").innerText =
    "Score: " + score + " | High: " + highScore + " | Level: " + level;

  requestAnimationFrame(loop);
}

function gameOver(){
  running = false;
  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }
  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("gameOver").style.display = "flex";
}

window.addEventListener("click", ()=>{ if(running) player.vy = -10; });
window.addEventListener("touchstart", ()=>{ if(running) player.vy = -10; });

</script></body>
</html>
